<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ny Trädgård</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f0f4f0;color:#1a2e1a;font-size:14px}
button{cursor:pointer;font-family:inherit;font-size:13px}
input,select,textarea{font-family:inherit;font-size:14px;width:100%;padding:8px 10px;border:1px solid #ccd8cc;border-radius:6px;outline:none;box-sizing:border-box}
select{background:#fff}
h1{font-size:20px;font-weight:800}h2{font-size:15px;font-weight:700}
a{color:#2d6a2d}
.card{background:#fff;border:1px solid #d4e4d4;border-radius:10px;padding:16px;margin-bottom:10px}
.btn{display:inline-block;border:none;border-radius:7px;font-weight:700;padding:8px 16px;cursor:pointer;white-space:nowrap;font-family:inherit}
.btn-primary{background:#2d6a2d;color:#fff}
.btn-ghost{background:transparent;color:#6b7c6b;border:1px solid #ccd8cc}
.btn-outline{background:transparent;color:#2d6a2d;border:1px solid #2d6a2d}
.btn-success{background:#16a34a;color:#fff}
.btn-danger{background:#dc2626;color:#fff}
.btn-sm{padding:4px 11px;font-size:12px}
.btn:disabled{opacity:0.5;cursor:not-allowed}
.tag{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;border-radius:4px;padding:2px 7px;white-space:nowrap}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:#fff;border-radius:14px;padding:24px;width:100%;max-width:520px;max-height:90vh;overflow:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-wide{max-width:700px}
.modal-title{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.close-btn{background:none;border:none;font-size:22px;color:#6b7c6b;cursor:pointer;line-height:1}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:0 14px}
.grid2 .span2{grid-column:1/-1}
.fld{margin-bottom:12px}
.fld label{display:block;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#6b7c6b;margin-bottom:4px}
.nav{background:#fff;border-bottom:1px solid #d4e4d4;overflow-x:auto;white-space:nowrap}
.nav button{background:none;border:none;padding:11px 14px;font-weight:700;color:#6b7c6b;border-bottom:2px solid transparent;font-family:inherit;font-size:13px;cursor:pointer}
.nav button.active{color:#2d6a2d;border-bottom-color:#2d6a2d}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:20px}
.stat-card{background:#fff;border:1px solid #d4e4d4;border-radius:10px;padding:14px;border-top:3px solid #ccc}
.stat-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#6b7c6b;margin-bottom:4px}
.stat-value{font-size:22px;font-weight:900;font-family:monospace}
.stat-sub{font-size:11px;color:#6b7c6b;margin-top:2px}
.toggle-row{display:flex;align-items:center;gap:12px;background:#e8f2e8;border-radius:8px;padding:10px 14px;cursor:pointer;margin-bottom:12px;user-select:none}
.toggle-track{width:38px;height:22px;border-radius:11px;position:relative;flex-shrink:0;transition:background .2s}
.toggle-thumb{position:absolute;top:3px;width:16px;height:16px;border-radius:50%;background:#fff;transition:left .2s}
.summary-box{background:#f0f4f0;border:1px solid #d4e4d4;border-radius:8px;padding:12px;margin-bottom:12px}
.summary-row{display:flex;justify-content:space-between;padding:2px 0;font-size:13px}
.empty-state{text-align:center;padding:36px;border:2px dashed #d4e4d4;border-radius:10px;background:#fff;color:#6b7c6b}
.client-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:14px}
.client-avatar{width:42px;height:42px;border-radius:50%;background:#e8f2e8;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:18px;color:#2d6a2d;flex-shrink:0}
.lead-pipeline{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:16px}
.pipeline-card{text-align:center;padding:10px 6px;background:#fff;border:1px solid #d4e4d4;border-radius:10px;border-top:3px solid #ccc}
.inv-header{background:#2d6a2d;padding:14px 18px;display:flex;justify-content:space-between;align-items:flex-start;border-radius:8px 8px 0 0}
.inv-info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.inv-info-box{background:#e8f2e8;border-radius:6px;padding:10px 12px}
.calc-box{background:#e8f2e8;border-radius:8px;padding:12px;margin-bottom:14px}
.alert-box{background:#fffbeb;border:1px solid #fde68a;border-radius:8px;padding:10px 14px;margin-bottom:14px}
.job-actions{display:flex;gap:7px;margin-top:10px;padding-top:10px;border-top:1px solid #d4e4d4;flex-wrap:wrap;align-items:center}
.job-meta{font-size:11px;color:#6b7c6b;margin-top:2px}
@media(max-width:600px){
  .grid2{grid-template-columns:1fr}.grid2 .span2{grid-column:1}
  .lead-pipeline{grid-template-columns:repeat(3,1fr)}
  .stat-grid{grid-template-columns:repeat(2,1fr)}
  .inv-info-grid{grid-template-columns:1fr}
  .client-grid{grid-template-columns:1fr}
}

.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-header{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px}
.cal-day-name{text-align:center;font-size:11px;font-weight:700;color:#6b7c6b;padding:4px 0;text-transform:uppercase}
.cal-day{min-height:80px;background:#fff;border:1px solid #e0e8e0;border-radius:6px;padding:4px;position:relative;cursor:pointer;transition:background .1s}
.cal-day:hover{background:#f0f7f0}
.cal-day.today{border:2px solid #2d6a2d;background:#f0f7f0}
.cal-day.other-month{background:#f8faf8;opacity:0.6}
.cal-day.selected{background:#e8f2e8;border-color:#2d6a2d}
.cal-date{font-size:11px;font-weight:700;color:#6b7c6b;margin-bottom:3px}
.cal-date.today-num{background:#2d6a2d;color:#fff;border-radius:50%;width:18px;height:18px;display:flex;align-items:center;justify-content:center;font-size:10px}
.cal-event{font-size:10px;background:#2d6a2d;color:#fff;border-radius:3px;padding:1px 5px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer}
.cal-event.status-paid{background:#16a34a}
.cal-event.status-sent{background:#d97706}
.cal-event.status-draft{background:#64748b}
.cal-event.status-unclear{background:#dc2626}
.cal-event.revisit{background:#9333ea}
.cal-event:hover{opacity:0.85}
.cal-nav{display:flex;align-items:center;gap:12px}

</style>
</head>
<body>
<div style="background:#2d6a2d;padding:0 16px;box-shadow:0 2px 8px rgba(0,0,0,.12)">
  <div style="max-width:1100px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:50px;gap:10px">
    <div style="display:flex;align-items:center;gap:9px">
      <div style="width:32px;height:32px;background:rgba(255,255,255,.2);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px">🌿</div>
      <div>
        <div style="font-weight:900;font-size:15px;color:#fff;line-height:1.1">Ny Tr&auml;dg&aring;rd</div>
        <div style="font-size:9px;color:rgba(255,255,255,.6);font-weight:600">Alexander &Ouml;rbom</div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <span id="save-msg" style="font-size:11px;color:#86efac;font-weight:700;display:none">&#10003; Sparat</span>
      <button class="btn btn-sm" style="background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);color:#fff" onclick="exportData()">&#8595; Exportera</button>
      <label class="btn btn-sm" style="background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);color:#fff;white-space:nowrap">&#8593; Importera<input type="file" accept=".json" onchange="importData(event)" style="display:none;width:auto;padding:0;border:none"></label>
    </div>
  </div>
</div>
<div class="nav">
  <div style="max-width:1100px;margin:0 auto;padding:0 12px">
    <button id="nav-dash" class="active" onclick="showTab('dash')">Översikt</button>
    <button id="nav-jobs" onclick="showTab('jobs')">Uppdrag</button>
    <button id="nav-leads" onclick="showTab('leads')">Leads</button>
    <button id="nav-clients" onclick="showTab('clients')">Kunder</button>
    <button id="nav-expenses" onclick="showTab('expenses')">Kostnader</button>
    <button id="nav-invoice" onclick="showTab('invoice')">Fakturor</button>
    <button id="nav-calendar" onclick="showTab('calendar')">Kalender</button>
  </div>
</div>
<div style="max-width:1100px;margin:0 auto;padding:20px 16px" id="content"></div>
<div id="modal-container"></div>
<script>
var DB={clients:[],jobs:[],leads:[],expenses:[]};
var currentTab='dash';
var rotClaimed=false;
var expenseDeductible=true;
var editingJobId=null;
var editingClientId=null;
var editingLeadId=null;
var editingExpenseId=null;
var invMode='invoice';
var jobSearch='';

var COMPANY={
  name:'Ny Tr\u00e4dg\u00e5rd',owner:'Alexander \u00d6rbom',
  org:'556XXX-XXXX',address:'Sommarvagen 1, Stocksund',
  phone:'+46 76 223 37 11',email:'orbomalexander@gmail.com',bankgiro:'XXX-XXXX'
};
var STATUS={
  draft:{label:'Utkast',color:'#64748b'},sent:{label:'Skickad',color:'#d97706'},
  invoiced:{label:'Fakturerad',color:'#2563eb'},paid:{label:'Betald',color:'#16a34a'},unclear:{label:'Oklar',color:'#dc2626'}
};
var LEAD_STATUS={
  new:{label:'Ny',color:'#2563eb'},contacted:{label:'Kontaktad',color:'#d97706'},
  quoted:{label:'Offertad',color:'#9333ea'},won:{label:'Vunnen',color:'#16a34a'},lost:{label:'F\u00f6rlorad',color:'#dc2626'}
};
var SERVICES=[
  {name:'H\u00f6gtryckstv\u00e4tt uppfart',unit:'m\u00b2',price:65,labPct:0.8},
  {name:'H\u00f6gtryckstv\u00e4tt fasad',unit:'m\u00b2',price:70,labPct:0.8},
  {name:'Gr\u00e4sklippning',unit:'m\u00b2',price:1.1,labPct:1.0},
  {name:'H\u00e4ckklippning',unit:'m',price:45,labPct:1.0},
  {name:'Takrensg\u00f6ring',unit:'m\u00b2',price:80,labPct:0.8},
  {name:'Ogr\u00e4srensning',unit:'tim',price:450,labPct:1.0},
  {name:'Buskar/Tr\u00e4d',unit:'tim',price:480,labPct:1.0},
  {name:'Sn\u00f6skottning',unit:'tim',price:400,labPct:1.0},
  {name:'Plantering',unit:'tim',price:460,labPct:0.9}
];
var EXPENSE_CATS=['Br\u00e4nsle','Material','Verktyg & maskiner','F\u00f6rs\u00e4kring','Marknadsf\u00f6ring','Telefon/IT','\u00d6vrigt'];

function kr(n){return new Intl.NumberFormat('sv-SE',{style:'currency',currency:'SEK',maximumFractionDigits:0}).format(n||0);}
function ds(d){if(!d)return'-';try{return new Date(d).toLocaleDateString('sv-SE');}catch(e){return'-';}}
function today(){return new Date().toISOString().slice(0,10);}
function newId(arr){if(!arr.length)return 1;var m=0;for(var i=0;i<arr.length;i++)if(arr[i].id>m)m=arr[i].id;return m+1;}
function calcRot(n){return Math.round((n||0)*0.3);}
function calcMoms(n){return Math.round((n||0)*0.25);}
function newInvNo(){
  var nums=[];
  for(var i=0;i<DB.jobs.length;i++){if(DB.jobs[i].invoiceNo){var p=DB.jobs[i].invoiceNo.split('-');nums.push(parseInt(p[p.length-1])||0);}}
  var next=nums.length?Math.max.apply(null,nums)+1:1;
  return 'F-'+new Date().getFullYear()+'-'+(next<10?'00':next<100?'0':'')+next;
}
function safeInitial(name){if(!name||name.length===0)return '?';return name.charAt(0).toUpperCase();}
function daysUntil(d){if(!d)return null;return Math.ceil((new Date(d)-new Date())/86400000);}
function esc(s){if(!s)return '';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function tag(status,map){var m=map||STATUS;var c=m[status]||{label:status,color:'#6b7c6b'};return '<span class="tag" style="color:'+c.color+';background:'+c.color+'18;border:1px solid '+c.color+'35">'+esc(c.label)+'</span>';}

function persist(){
  try{localStorage.setItem('nytradgard_v5',JSON.stringify(DB));}catch(e){}
  var el=document.getElementById('save-msg');
  if(el){el.style.display='inline';setTimeout(function(){el.style.display='none';},1800);}
}
function load(){
  try{var raw=localStorage.getItem('nytradgard_v5');if(raw){var d=JSON.parse(raw);if(d.clients)DB.clients=d.clients;if(d.jobs)DB.jobs=d.jobs;if(d.leads)DB.leads=d.leads;if(d.expenses)DB.expenses=d.expenses;}}catch(e){}
}
function exportData(){
  var blob=new Blob([JSON.stringify(DB,null,2)],{type:'application/json'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='nytradgard_'+today()+'.json';a.click();
}
function importData(ev){
  var file=ev.target.files[0];if(!file)return;
  var r=new FileReader();r.onload=function(e){try{var d=JSON.parse(e.target.result);if(d.clients)DB.clients=d.clients;if(d.jobs)DB.jobs=d.jobs;if(d.leads)DB.leads=d.leads;if(d.expenses)DB.expenses=d.expenses;persist();render();}catch(err){alert('Ogiltig fil');}};r.readAsText(file);ev.target.value='';
}

function getJob(id){for(var i=0;i<DB.jobs.length;i++)if(DB.jobs[i].id===id)return DB.jobs[i];return null;}
function getClient(id){for(var i=0;i<DB.clients.length;i++)if(DB.clients[i].id===id)return DB.clients[i];return null;}
function getLead(id){for(var i=0;i<DB.leads.length;i++)if(DB.leads[i].id===id)return DB.leads[i];return null;}
function getExpense(id){for(var i=0;i<DB.expenses.length;i++)if(DB.expenses[i].id===id)return DB.expenses[i];return null;}

function showTab(t){
  currentTab=t;
  var tabs=['dash','jobs','leads','clients','expenses','invoice','calendar'];
  for(var i=0;i<tabs.length;i++){var b=document.getElementById('nav-'+tabs[i]);if(b)b.className=tabs[i]===t?'active':'';}
  render();
}
function updateLeadsBadge(){
  var cnt=DB.leads.filter(function(l){return l.status!=='won'&&l.status!=='lost';}).length;
  var b=document.getElementById('nav-leads');if(b)b.textContent=cnt>0?'Leads ('+cnt+')':'Leads';
}
function render(){
  var el=document.getElementById('content');if(!el)return;
  if(currentTab==='dash')el.innerHTML=renderDash();
  else if(currentTab==='jobs'){el.innerHTML=renderJobs();setTimeout(renderJobList,0);}
  else if(currentTab==='leads')el.innerHTML=renderLeads();
  else if(currentTab==='clients')el.innerHTML=renderClients();
  else if(currentTab==='expenses')el.innerHTML=renderExpenses();
  else if(currentTab==='invoice'){el.innerHTML=renderInvoice();setTimeout(updateInvPreview,0);}
  else if(currentTab==='calendar'){el.innerHTML=renderCalendar();}
  updateLeadsBadge();
}

// ---- DASHBOARD ----
function renderDash(){
  var paid=DB.jobs.filter(function(j){return j.status==='paid';});
  var revenue=paid.reduce(function(s,j){return s+j.labourCost+j.materialCost;},0);
  var outstanding=DB.jobs.filter(function(j){return j.status==='sent'||j.status==='invoiced';}).reduce(function(s,j){var n=j.labourCost+j.materialCost;return s+n+calcMoms(n)-(j.rotClaimed?calcRot(j.labourCost):0);},0);
  var rotTotal=DB.jobs.filter(function(j){return j.rotClaimed;}).reduce(function(s,j){return s+calcRot(j.labourCost);},0);
  var expTotal=DB.expenses.reduce(function(s,ex){return s+(ex.amount||0);},0);
  var deductible=DB.expenses.filter(function(ex){return ex.deductible!==false;}).reduce(function(s,ex){return s+(ex.amount||0);},0);
  var profit=revenue-deductible;
  var activeLeads=DB.leads.filter(function(l){return l.status!=='won'&&l.status!=='lost';}).length;
  var leadValue=DB.leads.filter(function(l){return l.status!=='lost';}).reduce(function(s,l){return s+(parseFloat(l.estimatedValue)||0);},0);
  var revisits=DB.jobs.filter(function(j){if(!j.revisit)return false;var d=daysUntil(j.revisit);return d!==null&&d>=0&&d<=14;});
  revisits.sort(function(a,b){return new Date(a.revisit)-new Date(b.revisit);});
  var h='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px"><h1>Översikt</h1><button class="btn btn-primary btn-sm" onclick="openJobForm()">+ Nytt uppdrag</button></div>';
  h+='<div class="stat-grid">';
  var stats=[{l:'Intäkter',v:kr(revenue),s:paid.length+' betalda',b:'#16a34a'},{l:'Utestående',v:kr(outstanding),s:'att fakturera',b:'#d97706'},{l:'Resultat',v:kr(profit),s:'intäkt - kostnad',b:profit>=0?'#16a34a':'#dc2626'},{l:'ROT ansökt',v:kr(rotTotal),s:'Skatteverket',b:'#2563eb'},{l:'Kostnader',v:kr(expTotal),s:'inkl moms',b:'#dc2626'},{l:'Pipeline',v:kr(leadValue),s:activeLeads+' aktiva leads',b:'#9333ea'}];
  for(var i=0;i<stats.length;i++)h+='<div class="stat-card" style="border-top-color:'+stats[i].b+'"><div class="stat-label">'+stats[i].l+'</div><div class="stat-value">'+stats[i].v+'</div><div class="stat-sub">'+stats[i].s+'</div></div>';
  h+='</div>';
  if(revisits.length>0){
    h+='<div class="alert-box"><strong style="color:#92400e">Återbesök inom 14 dagar ('+revisits.length+')</strong><div style="margin-top:8px;display:flex;flex-wrap:wrap;gap:8px">';
    for(var i=0;i<revisits.length;i++){var j=revisits[i];var c=getClient(j.clientId);var d=daysUntil(j.revisit);h+='<div style="background:#fff;border:1px solid #fde68a;border-radius:6px;padding:5px 10px;font-size:12px"><strong>'+(c?esc(c.name):'-')+'</strong> '+esc(ds(j.revisit))+' <span style="font-weight:700;color:'+(d===0?'#dc2626':d<=3?'#d97706':'#16a34a')+'">'+(d===0?'Idag':d+' dagar')+'</span></div>';}
    h+='</div></div>';
  }
  h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">';
  h+='<div><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><h2>Senaste uppdrag</h2><button class="btn btn-outline btn-sm" onclick="openJobForm()">+ Nytt</button></div>';
  if(DB.jobs.length===0){h+='<div class="empty-state">Inga uppdrag ännu</div>';}
  else{var recent=DB.jobs.slice().reverse().slice(0,5);for(var i=0;i<recent.length;i++){var j=recent[i];var c=getClient(j.clientId);h+='<div class="card" style="padding:11px 14px"><div style="display:flex;justify-content:space-between"><div><div style="font-weight:700">'+(c?esc(c.name):'-')+'</div><div style="font-size:11px;color:#6b7c6b">'+esc(j.description.slice(0,38))+'</div></div><div style="text-align:right">'+tag(j.status)+'<div style="font-weight:800;font-family:monospace;font-size:12px;margin-top:3px">'+kr(j.labourCost+j.materialCost)+'</div></div></div></div>';}}
  h+='</div><div><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><h2>Leads pipeline</h2><button class="btn btn-outline btn-sm" onclick="openLeadForm()">+ Ny</button></div>';
  var lkeys=['new','contacted','quoted','won'];
  for(var i=0;i<lkeys.length;i++){var k=lkeys[i];var cfg=LEAD_STATUS[k];var cnt=DB.leads.filter(function(l){return l.status===this;}.bind(k)).length;var val=DB.leads.filter(function(l){return l.status===this;}.bind(k)).reduce(function(s,l){return s+(parseFloat(l.estimatedValue)||0);},0);h+='<div style="display:flex;align-items:center;gap:10px;padding:8px 12px;background:#fff;border:1px solid #d4e4d4;border-radius:8px;margin-bottom:6px"><div style="width:8px;height:8px;border-radius:50%;background:'+cfg.color+';flex-shrink:0"></div><span style="flex:1;font-weight:600">'+cfg.label+'</span><span style="font-size:12px;color:#6b7c6b">'+cnt+' st</span>'+(val>0?'<span style="font-size:12px;font-family:monospace;color:'+cfg.color+';font-weight:700">'+kr(val)+'</span>':'')+'</div>';}
  h+='</div></div>';
  return h;
}

// ---- JOBS ----
function renderJobs(){
  return '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px"><h1>Uppdrag</h1><div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap"><input style="width:180px;padding:6px 10px;font-size:13px" value="'+esc(jobSearch)+'" oninput="jobSearch=this.value;renderJobList()" placeholder="Sök kund / tjänst..."><button class="btn btn-primary btn-sm" onclick="openJobForm()">+ Nytt uppdrag</button></div></div><div id="job-list"></div>';
}
function renderJobList(){
  var el=document.getElementById('job-list');if(!el)return;
  var jobs=DB.jobs;

function toggleRot(){rotClaimed=!rotClaimed;var t=document.getElementById('rot-track');var th=document.getElementById('rot-thumb');if(t)t.style.background=rotClaimed?'#2d6a2d':'#ccd8cc';if(th)th.style.left=rotClaimed?'18px':'3px';updateJobSummary();}
function updateJobSummary(){

  var data={id:editingLeadId||newId(DB.leads),name:nameEl.value.trim(),address:document.getElementById('lf-address').value,phone:document.getElementById('lf-phone').value,email:document.getElementById('lf-email').value,source:document.getElementById('lf-source').value,status:document.getElementById('lf-status').value,estimatedValue:document.getElementById('lf-value').value,notes:document.getElementById('lf-notes').value,createdAt:editingLeadId?(getLead(editingLeadId)||{}).createdAt||today():today()};
  if(editingLeadId){for(var i=0;i<DB.leads.length;i++)if(DB.leads[i].id===editingLeadId){DB.leads[i]=data;break;}}else{DB.leads.push(data);}
  persist();closeModal();render();
}

// ---- EXPENSE FORM ----
function openExpenseForm(id){
  editingExpenseId=id||null;var ex=id?getExpense(id):null;
  expenseDeductible=ex?ex.deductible!==false:true;
  var h='<div class="grid2"><div class="fld"><label>Datum</label><input type="date" id="ef-date" value="'+(ex?ex.date:today())+'"></div><div class="fld"><label>Kategori</label><select id="ef-cat">';
  for(var i=0;i<EXPENSE_CATS.length;i++)h+='<option value="'+EXPENSE_CATS[i]+'"'+(ex&&ex.category===EXPENSE_CATS[i]?' selected':'')+'>'+EXPENSE_CATS[i]+'</option>';
  h+='</select></div><div class="fld span2"><label>Beskrivning</label><input type="text" id="ef-desc" value="'+(ex?esc(ex.description):'')+'"></div><div class="fld"><label>Belopp inkl moms (kr)</label><input type="number" id="ef-amount" value="'+(ex?ex.amount:'')+'" placeholder="0"></div><div class="fld"><label>Kvittonummer</label><input type="text" id="ef-ref" value="'+(ex?esc(ex.receiptRef||''):'')+'" placeholder="KV-001"></div></div>';
  h+='<div class="toggle-row" onclick="toggleDeductible()"><div class="toggle-track" id="deduct-track" style="background:'+(expenseDeductible?'#2d6a2d':'#ccd8cc')+'"><div class="toggle-thumb" id="deduct-thumb" style="left:'+(expenseDeductible?'18px':'3px')+'"></div></div><div><div style="font-weight:700;font-size:13px">Avdragsgill kostnad</div><div style="font-size:11px;color:#6b7c6b">Markeras för skattedeklarationen</div></div></div>';
  openModal(ex?'Redigera kostnad':'Lägg till kostnad',h,'<button class="btn btn-ghost" onclick="closeModal()">Avbryt</button><button class="btn btn-primary" onclick="saveExpenseForm()">Spara</button>');
}
function toggleDeductible(){expenseDeductible=!expenseDeductible;var t=document.getElementById('deduct-track');var th=document.getElementById('deduct-thumb');if(t)t.style.background=expenseDeductible?'#2d6a2d':'#ccd8cc';if(th)th.style.left=expenseDeductible?'18px':'3px';}
function saveExpenseForm(){
  var descEl=document.getElementById('ef-desc');var amtEl=document.getElementById('ef-amount');if(!descEl||!descEl.value.trim()){alert('Fyll i beskrivning');return;}
  var data={id:editingExpenseId||newId(DB.expenses),date:document.getElementById('ef-date').value,category:document.getElementById('ef-cat').value,description:descEl.value.trim(),amount:parseFloat(amtEl.value)||0,receiptRef:document.getElementById('ef-ref').value,deductible:expenseDeductible};
  if(editingExpenseId){for(var i=0;i<DB.expenses.length;i++)if(DB.expenses[i].id===editingExpenseId){DB.expenses[i]=data;break;}}else{DB.expenses.push(data);}
  persist();closeModal();render();
}


// ---- CALENDAR ----
var calYear = new Date().getFullYear();
var calMonth = new Date().getMonth();
var calSelectedDay = null;

function renderCalendar() {
  var now = new Date();
  var monthNames = ['Januari','Februari','Mars','April','Maj','Juni','Juli','Augusti','September','Oktober','November','December'];
  var dayNames = ['Mån','Tis','Ons','Tor','Fre','Lör','Sön'];
  
  var h = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px">';
  h += '<h1>Kalender</h1>';
  h += '<div class="cal-nav">';
  h += '<button class="btn btn-ghost btn-sm" onclick="calNav(-1)">&lsaquo; Föregående</button>';
  h += '<span style="font-weight:800;font-size:16px;min-width:160px;text-align:center">'+monthNames[calMonth]+' '+calYear+'</span>';
  h += '<button class="btn btn-ghost btn-sm" onclick="calNav(1)">Nästa &rsaquo;</button>';
  h += '<button class="btn btn-outline btn-sm" onclick="calToday()">Idag</button>';
  h += '<button class="btn btn-primary btn-sm" onclick="openBookingForm(null,null)">+ Bokning</button>';
  h += '</div></div>';

  // Mini stats for month
  var monthJobs = DB.jobs.filter(function(j){
    if(!j.date) return false;
    var d = new Date(j.date);
    return d.getFullYear()===calYear && d.getMonth()===calMonth;
  });
  var monthRevenue = monthJobs.filter(function(j){return j.status==='paid';}).reduce(function(s,j){return s+j.labourCost+j.materialCost;},0);
  h += '<div style="display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap">';
  h += '<div style="background:#fff;border:1px solid #d4e4d4;border-radius:8px;padding:10px 16px;font-size:12px"><span style="color:#6b7c6b">Uppdrag denna månad: </span><strong>'+monthJobs.length+'</strong></div>';
  h += '<div style="background:#fff;border:1px solid #d4e4d4;border-radius:8px;padding:10px 16px;font-size:12px"><span style="color:#6b7c6b">Intäkter: </span><strong style="color:#16a34a">'+kr(monthRevenue)+'</strong></div>';
  var booked = monthJobs.filter(function(j){return j.status==='sent'||j.status==='invoiced';}).length;
  h += '<div style="background:#fff;border:1px solid #d4e4d4;border-radius:8px;padding:10px 16px;font-size:12px"><span style="color:#6b7c6b">Bokade: </span><strong style="color:#d97706">'+booked+'</strong></div>';
  h += '</div>';

  // Day name headers
  h += '<div class="cal-header">';
  for(var d=0;d<7;d++) h += '<div class="cal-day-name">'+dayNames[d]+'</div>';
  h += '</div>';

  // Calendar grid
  var firstDay = new Date(calYear, calMonth, 1);
  var lastDay = new Date(calYear, calMonth+1, 0);
  // Monday=0 offset
  var startOffset = (firstDay.getDay()+6)%7;
  var totalCells = Math.ceil((startOffset + lastDay.getDate()) / 7) * 7;

  h += '<div class="cal-grid">';
  for(var i=0;i<totalCells;i++) {
    var dayNum = i - startOffset + 1;
    var isCurrentMonth = dayNum >= 1 && dayNum <= lastDay.getDate();
    var dateStr = '';
    var isToday = false;
    var cellClasses = 'cal-day';
    if(!isCurrentMonth) {
      cellClasses += ' other-month';
    } else {
      dateStr = calYear+'-'+(calMonth+1<10?'0':'')+(calMonth+1)+'-'+(dayNum<10?'0':'')+dayNum;
      isToday = (calYear===now.getFullYear() && calMonth===now.getMonth() && dayNum===now.getDate());
      if(isToday) cellClasses += ' today';
    }

    h += '<div class="'+cellClasses+'" data-date="'+dateStr+'" onclick="calDayClick(this.dataset.date)">';
    if(isCurrentMonth) {
      h += '<div class="cal-date'+(isToday?' today-num':'')+'">'+dayNum+'</div>';
      // Jobs on this day
      var dayJobs = DB.jobs.filter(function(j){ return j.date===this; }.bind(dateStr));
      for(var ji=0;ji<dayJobs.length;ji++) {
        var j = dayJobs[ji];
        var c = getClient(j.clientId);
        var name = c ? c.name.split(' ')[0] : 'Kund';
        h += '<div class="cal-event status-'+j.status+'" title="'+esc(c?c.name:'')+': '+esc(j.description)+'" onclick="event.stopPropagation();openJobForm('+j.id+')">'+esc(name)+'</div>';
      }
      // Revisits on this day
      var revisitJobs = DB.jobs.filter(function(j){ return j.revisit===this; }.bind(dateStr));
      for(var ri=0;ri<revisitJobs.length;ri++) {
        var j = revisitJobs[ri];
        var c = getClient(j.clientId);
        var name = c ? c.name.split(' ')[0] : 'Kund';
        h += '<div class="cal-event revisit" title="Återbesök: '+esc(c?c.name:'')+'" onclick="event.stopPropagation();openJobForm('+j.id+')">↩ '+esc(name)+'</div>';
      }
      // + button on hover
      h += '<div style="position:absolute;bottom:3px;right:4px;font-size:16px;color:#ccd8cc" data-d="'+dateStr+'" onclick="event.stopPropagation();calAddOnDate(this.dataset.d)">+</div>';
    }
    h += '</div>';
  }
  h += '</div>';

  // Legend
  h += '<div style="display:flex;gap:10px;margin-top:12px;flex-wrap:wrap;align-items:center">';
  h += '<span style="font-size:11px;color:#6b7c6b;font-weight:700">Förklaring:</span>';
  var legend = [{c:'#64748b',l:'Utkast'},{c:'#d97706',l:'Skickad'},{c:'#16a34a',l:'Betald'},{c:'#2d6a2d',l:'Fakturerad'},{c:'#dc2626',l:'Oklar'},{c:'#9333ea',l:'Återbesök'}];
  for(var i=0;i<legend.length;i++) h += '<div style="display:flex;align-items:center;gap:4px;font-size:11px"><div style="width:12px;height:12px;border-radius:3px;background:'+legend[i].c+'"></div>'+legend[i].l+'</div>';
  h += '</div>';

  // Week view for selected week / upcoming jobs
  h += '<div style="margin-top:20px"><h2 style="margin-bottom:10px">Kommande uppdrag</h2>';
  var upcoming = DB.jobs.filter(function(j){
    if(!j.date) return false;
    var d = new Date(j.date);
    var today = new Date(); today.setHours(0,0,0,0);
    return d >= today;
  }).sort(function(a,b){return new Date(a.date)-new Date(b.date);}).slice(0,8);
  if(upcoming.length===0) {
    h += '<div style="color:#6b7c6b;font-size:13px;padding:10px 0">Inga kommande uppdrag bokade.</div>';
  } else {
    for(var i=0;i<upcoming.length;i++) {
      var j = upcoming[i];
      var c = getClient(j.clientId);
      var n = j.labourCost+j.materialCost;
      var rot = j.rotClaimed?calcRot(j.labourCost):0;
      var d = daysUntil(j.date);
      h += '<div class="card" style="padding:11px 16px;margin-bottom:8px"><div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px">';
      h += '<div style="display:flex;align-items:center;gap:12px">';
      h += '<div style="text-align:center;background:#e8f2e8;border-radius:8px;padding:6px 10px;min-width:50px">';
      h += '<div style="font-size:18px;font-weight:900;color:#2d6a2d">'+new Date(j.date).getDate()+'</div>';
      h += '<div style="font-size:9px;color:#6b7c6b;font-weight:700">'+['Jan','Feb','Mar','Apr','Maj','Jun','Jul','Aug','Sep','Okt','Nov','Dec'][new Date(j.date).getMonth()]+'</div></div>';
      h += '<div><div style="display:flex;align-items:center;gap:6px;margin-bottom:2px"><span style="font-weight:700">'+(c?esc(c.name):'Okänd')+'</span>'+tag(j.status);
      if(j.rotClaimed) h += '<span class="tag" style="color:#16a34a;background:#f0fdf4;border:1px solid #bbf7d0">ROT</span>';
      h += '</div><div style="font-size:12px;color:#6b7c6b">'+esc(j.description)+'</div>';
      if(j.hours>0) h += '<div style="font-size:11px;color:#6b7c6b">'+j.hours+' timmar</div>';
      h += '</div></div>';
      h += '<div style="display:flex;align-items:center;gap:12px">';
      h += '<div style="text-align:right"><div style="font-weight:800;font-family:monospace">'+kr(n+calcMoms(n)-rot)+'</div>';
      h += '<div style="font-size:11px;color:'+(d===0?'#dc2626':d<=3?'#d97706':'#6b7c6b')+'">'+(d===0?'Idag':d===1?'Imorgon':d+' dagar')+'</div></div>';
      h += '<div style="display:flex;gap:6px">';
      h += '<button class="btn btn-ghost btn-sm" onclick="openJobForm('+j.id+')">Redigera</button>';
      if(j.status==='draft') h += '<button class="btn btn-outline btn-sm" onclick="sendJob('+j.id+');render()">Skicka</button>';
      if(j.status==='sent'||j.status==='invoiced') h += '<button class="btn btn-success btn-sm" onclick="payJob('+j.id+');render()">Betald</button>';
      h += '<button class="btn btn-danger btn-sm" onclick="deleteJob('+j.id+')">Ta bort</button>';
      h += '</div></div></div></div>';
    }
  }
  h += '</div>';
  return h;
}

function calNav(dir) {
  calMonth += dir;
  if(calMonth > 11) { calMonth = 0; calYear++; }
  if(calMonth < 0)  { calMonth = 11; calYear--; }
  render();
}
function calToday() {
  var now = new Date();
  calYear = now.getFullYear();
  calMonth = now.getMonth();
  render();
}
function calDayClick(dateStr) {
  if(!dateStr) return;
  openBookingForm(null, dateStr);
}

// Quick booking form (pre-fills date)
function openBookingForm(jobId, dateStr) {
  editingJobId = jobId || null;
  var j = jobId ? getJob(jobId) : null;
  rotClaimed = j ? !!j.rotClaimed : false;
  var clientId = j ? j.clientId : (DB.clients.length>0 ? DB.clients[0].id : '');
  var date = dateStr || (j ? j.date : today());

  var h = '<div class="grid2">';
  h += '<div class="fld span2"><label>Kund</label><select id="bf-client">';
  if(DB.clients.length===0) h += '<option value="">Lägg till kund först</option>';
  for(var i=0;i<DB.clients.length;i++) h += '<option value="'+DB.clients[i].id+'"'+(DB.clients[i].id===clientId?' selected':'')+'>'+esc(DB.clients[i].name)+'</option>';
  h += '</select></div>';
  h += '<div class="fld"><label>Datum</label><input type="date" id="bf-date" value="'+date+'"></div>';
  h += '<div class="fld"><label>Status</label><select id="bf-status">';
  var sk = Object.keys(STATUS);
  for(var i=0;i<sk.length;i++) h += '<option value="'+sk[i]+'"'+(j&&j.status===sk[i]?' selected':sk[i]==='sent'&&!j?' selected':'')+'>'+STATUS[sk[i]].label+'</option>';
  h += '</select></div>';
  h += '<div class="fld span2"><label>Beskrivning</label><input type="text" id="bf-desc" value="'+(j?esc(j.description):'')+'" placeholder="T.ex. Gräsklippning, högtryckstvätt..."></div>';
  h += '<div class="fld"><label>Arbetskostnad kr (exkl moms)</label><input type="number" id="bf-labour" value="'+(j?j.labourCost:'')+'" oninput="updateBookSummary()" placeholder="0"></div>';
  h += '<div class="fld"><label>Material kr (exkl moms)</label><input type="number" id="bf-material" value="'+(j?j.materialCost:'')+'" oninput="updateBookSummary()" placeholder="0"></div>';
  h += '<div class="fld"><label>Timmar</label><input type="number" id="bf-hours" value="'+(j?j.hours:'')+'" placeholder="0"></div>';
  h += '<div class="fld"><label>Återbesök (datum)</label><input type="date" id="bf-revisit" value="'+(j&&j.revisit?j.revisit:'')+'"></div>';
  h += '<div class="fld span2"><label>Anteckningar</label><textarea id="bf-notes" rows="2">'+(j?esc(j.notes||''):'')+'</textarea></div>';
  h += '</div>';
  h += '<div class="toggle-row" onclick="toggleBookRot()"><div class="toggle-track" id="brot-track" style="background:'+(rotClaimed?'#2d6a2d':'#ccd8cc')+'"><div class="toggle-thumb" id="brot-thumb" style="left:'+(rotClaimed?'18px':'3px')+'"></div></div><div><div style="font-weight:700;font-size:13px">ROT-avdrag</div><div style="font-size:11px;color:#6b7c6b">Kunden drar av 30% på arbetskostnad</div></div></div>';
  h += '<div id="book-summary" class="summary-box" style="display:none"></div>';

  openModal(j?'Redigera bokning':'Ny bokning - '+ds(date), h,
    '<button class="btn btn-ghost" onclick="closeModal()">Avbryt</button>'+(j?'<button class="btn btn-danger" onclick="deleteJobAndClose('+j.id+')">Ta bort</button>':'')+'<button class="btn btn-primary" onclick="saveBookingForm()">Spara bokning</button>'
  );
  setTimeout(function(){ updateBookSummary(); }, 0);
}

function deleteJobAndClose(id) {
  if(!confirm('Ta bort denna bokning?')) return;
  DB.jobs = DB.jobs.filter(function(j){ return j.id!==id; });
  persist(); closeModal(); render();
}

function toggleBookRot() {
  rotClaimed = !rotClaimed;
  var t = document.getElementById('brot-track');
  var th = document.getElementById('brot-thumb');
  if(t) t.style.background = rotClaimed ? '#2d6a2d' : '#ccd8cc';
  if(th) th.style.left = rotClaimed ? '18px' : '3px';
  updateBookSummary();
}

function updateBookSummary() {
  var labEl = document.getElementById('bf-labour');
  var matEl = document.getElementById('bf-material');
  var sumEl = document.getElementById('book-summary');
  if(!labEl||!matEl||!sumEl) return;
  var lab = parseFloat(labEl.value)||0, mat = parseFloat(matEl.value)||0, net = lab+mat;
  if(net===0) { sumEl.style.display='none'; return; }
  var rot = rotClaimed ? calcRot(lab) : 0;
  var rows = [['Arbete',kr(lab),''],['Material',kr(mat),''],['Moms 25%',kr(calcMoms(net)),'']];
  if(rotClaimed) rows.push(['ROT-avdrag','- '+kr(rot),'color:#16a34a']);
  rows.push(['Kunden betalar',kr(net+calcMoms(net)-rot),'font-weight:800;color:#2d6a2d']);
  var h = '';
  for(var i=0;i<rows.length;i++) h += '<div class="summary-row"><span style="color:#6b7c6b">'+rows[i][0]+'</span><span style="font-family:monospace;'+rows[i][2]+'">'+rows[i][1]+'</span></div>';
  sumEl.innerHTML = h; sumEl.style.display = 'block';
}

function saveBookingForm() {
  var desc = document.getElementById('bf-desc');
  var clientEl = document.getElementById('bf-client');
  if(!desc||!desc.value.trim()) { alert('Fyll i beskrivning'); return; }
  if(!clientEl||!clientEl.value) { alert('Välj en kund'); return; }
  var status = document.getElementById('bf-status').value;
  var existingJob = editingJobId ? getJob(editingJobId) : null;
  var invNo = existingJob ? existingJob.invoiceNo : null;
  if(!invNo && status!=='draft') invNo = newInvNo();
  var jobData = {
    id: editingJobId || newId(DB.jobs),
    clientId: parseInt(clientEl.value),
    date: document.getElementById('bf-date').value,
    description: desc.value.trim(),
    labourCost: parseFloat(document.getElementById('bf-labour').value)||0,
    materialCost: parseFloat(document.getElementById('bf-material').value)||0,
    hours: parseFloat(document.getElementById('bf-hours').value)||0,
    status: status,
    rotClaimed: rotClaimed,
    notes: document.getElementById('bf-notes').value,
    revisit: document.getElementById('bf-revisit').value,
    recurring: existingJob ? existingJob.recurring||'' : '',
    invoiceNo: invNo
  };
  if(editingJobId) {
    for(var i=0;i<DB.jobs.length;i++) if(DB.jobs[i].id===editingJobId) { DB.jobs[i]=jobData; break; }
  } else {
    DB.jobs.push(jobData);
  }
  persist(); closeModal(); render();
}

load();render();
</script>
